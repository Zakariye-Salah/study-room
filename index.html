<!DOCTYPE html>
<html lang="en">
<head>  
  <meta charset="UTF-8">
  <title>Study Room Pro</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  
  <!-- Firebase Compat Legacy Libraries -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
</head>
<body>

<div class="app">
  <header class="header">
    <h1>📚 Study Room Pro</h1>
    <p class="subtitle">Secure Learning System</p>
  </header>

  <!-- ONLINE COUNT -->
  <section class="status-section">
    <span class="label">Online now</span>
    <span id="onlineCount" class="count">0</span>
  </section>

  <!-- TIMER -->
  <section class="timer-box">
    ⏱ Time in room: <span id="timer">0m 0s</span>
  </section>

  <!-- USER MAIN INTERFACE FORM -->
  <section class="form-section" id="formBox">
    <form id="joinForm">
      <input type="text" id="nameInput" placeholder="Your name" required>
      <input type="text" id="codeInput" placeholder="Seat code (01–05)" maxlength="2" required>
      <input type="password" id="pinInput" placeholder="Enter PIN" required>
      
      <!-- REMEMBER ME -->
      <div class="remember-box" style="margin: 10px 0; display: flex; align-items: center; gap: 8px;">
        <input type="checkbox" id="rememberMe">
        <label for="rememberMe" style="font-size: 13px; color: #555; cursor: pointer;">Remember Me</label>
      </div>

      <button type="submit" id="joinBtn">Join Secure Room</button>
    </form>
    
    <hr style="margin: 15px 0; border: 0; border-top: 1px solid #ddd;">
    
    <!-- ADMIN ACCESS INITIATOR -->
    <button type="button" id="adminToggleBtn" style="background: #64748b; color: white;">Admin Portal Login</button>
  </section>

  <!-- ADMIN AUTH FORM -->
  <section id="adminAuthBox" class="hidden" style="margin-top: 15px; background: #f8fafc; padding: 15px; border-radius: 10px; border: 1px solid #cbd5e1;">
    <h3 style="margin-bottom: 10px; color: #1e293b; font-size: 14px;">🛡️ Authenticate Admin</h3>
    <input type="text" id="adminEmail" placeholder="Admin Email">
    <input type="password" id="adminPassword" placeholder="Admin Password">
    <div style="display:flex; gap: 10px;">
      <button id="adminLoginBtn" style="background: #0f172a; color: white; padding: 8px;">Login</button>
      <button id="adminCancelBtn" style="background: #94a3b8; color: white; padding: 8px;">Back</button>
    </div>
  </section>

  <!-- USER LEAVE / ACTION CONTROL -->
  <button id="leaveBtn" class="hidden">Leave Room</button>
  
  <div id="pinActionBox" class="hidden" style="margin-top: 10px;">
    <button id="changePinBtn" style="background: #f59e0b; color: white;">Change PIN</button> 
  </div>

  <!-- STATUS AREA -->
  <p id="userStatus" class="status-text">Not joined</p>

  <!-- USERS -->
  <section class="users-section">
    <h3>🟢 Online Students</h3>
    <div id="usersList"></div>
  </section>

  <!-- ATTENDANCE -->
  <section class="dashboard">
    <h3>📊 Attendance</h3>
    <div id="attendanceList"></div>
  </section>

  <!-- DYNAMIC LIVE ADMIN DASHBOARD PANEL -->
  <section class="admin-panel hidden" id="adminPanel">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
      <h3>🛡️ Master Admin Control</h3>
      <button id="adminLogoutBtn" style="background: #3b82f6; width: auto; padding: 4px 10px; font-size: 12px; margin: 0;">Logout Admin</button>
    </div>
    <div id="adminSeatsDashboard" style="display: flex; flex-direction: column; gap: 8px;">
       <!-- Generates Live Admin control links automatically via JavaScript -->
    </div>
  </section>

</div>

<!-- TOASTS -->
<div id="toastContainer"></div>

<script src="database.js"></script>
</body>
</html>
